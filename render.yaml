# render.yaml - Corrected for Render Blueprint (Docker builds use "build:" object)
services:
  # ------------------- FRONTEND (Node runtime) -------------------
  - type: web
    name: veloztrade-frontend
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NEXT_PUBLIC_API_URL
        value: https://veloztrade-api-gateway.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://veloztrade-api-gateway.onrender.com

  # ------------------- API GATEWAY (Docker build) -------------------
  - type: web
    name: veloztrade-api-gateway
    plan: starter
    build:                                    # <-- critical: use "build:" object
      dockerfilePath: backend/api-gateway/Dockerfile
      dockerContext: backend/api-gateway
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ALLTICK_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

  # ------------------- MARKET DATA (Docker build) -------------------
  - type: web
    name: veloztrade-market-data
    plan: starter
    build:
      dockerfilePath: backend/market-data/Dockerfile
      dockerContext: backend/market-data
    envVars:
      - key: REDIS_URL
        sync: false
      - key: ALLTICK_API_KEY
        sync: false
      - key: ALLTICK_WS_URL
        value: wss://quote.alltick.io/quote-b-api/ws

  # ------------------- ORDER ENGINE (worker – Docker build) -------------------
  - type: worker
    name: veloztrade-order-engine
    plan: starter
    build:
      dockerfilePath: backend/order-engine/Dockerfile
      dockerContext: backend/order-engine
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # ------------------- ADMIN PANEL (Docker build) -------------------
  - type: web
    name: veloztrade-admin
    plan: starter
    build:
      dockerfilePath: backend/admin-panel/Dockerfile
      dockerContext: backend/admin-panel
    envVars:
      - key: REACT_APP_API_URL
        value: https://veloztrade-api-gateway.onrender.com
