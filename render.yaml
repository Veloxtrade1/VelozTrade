services:
  # Frontend (Next.js)
  - type: web
    name: veloztrade-frontend
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NEXT_PUBLIC_API_URL
        value: https://veloztrade-api-gateway.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://veloztrade-api-gateway.onrender.com

  # API Gateway (Express)
  - type: web
    name: veloztrade-api-gateway
    runtime: node
    plan: starter
    buildCommand: cd backend/api-gateway && npm install
    startCommand: cd backend/api-gateway && node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ALLTICK_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

  # Market Data (WebSocket client)
  - type: web
    name: veloztrade-market-data
    runtime: node
    plan: starter
    buildCommand: cd backend/market-data && npm install
    startCommand: cd backend/market-data && node index.js
    envVars:
      - key: REDIS_URL
        sync: false
      - key: ALLTICK_API_KEY
        sync: false
      - key: ALLTICK_WS_URL
        value: wss://quote.alltick.io/quote-b-api/ws

  # Order Engine (background worker)
  - type: worker
    name: veloztrade-order-engine
    runtime: node
    plan: starter
    buildCommand: cd backend/order-engine && npm install
    startCommand: cd backend/order-engine && node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # Admin Panel (React – built with serve)
  - type: web
    name: veloztrade-admin
    runtime: node
    plan: starter
    buildCommand: cd backend/admin-panel && npm install && npm run build
    startCommand: cd backend/admin-panel && npx serve -s build -l 3002
    envVars:
      - key: REACT_APP_API_URL
        value: https://veloztrade-api-gateway.onrender.com
